name: Build JNI All-in-One JAR

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'launcher/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 设置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 编译 C native 库 (.so) + 嵌入 index.js
        run: |
          mkdir -p build/native
          # ★ 把 index.js 转成 C 头文件（字节数组）
          xxd -i -n index_js app/index.js > build/native/index_js.h
          echo "index_js.h 大小: $(du -sh build/native/index_js.h | cut -f1)"
          # 编译 .so（包含 index.js 内容）
          gcc -shared -fPIC -o build/native/libnative_exec.so \
            -I"${JAVA_HOME}/include" \
            -I"${JAVA_HOME}/include/linux" \
            -I"build/native" \
            launcher/native/native_exec.c
          echo "✅ .so 编译完成（含 index.js）"
          ls -la build/native/

      - name: 安装应用依赖
        run: |
          cp app/package.json .
          npm install --omit=dev --no-audit --no-fund --no-progress
          mkdir -p runtime
          mv node_modules runtime/
          cd runtime/node_modules
          find . -type f -name "*.md" -delete 2>/dev/null || true
          find . -type d -name "test" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "docs" -exec rm -rf {} + 2>/dev/null || true
          cd ../..
          echo "node_modules 体积: $(du -sh runtime/node_modules | cut -f1)"

      - name: 编译 Java 启动器
        run: |
          mkdir -p build/classes
          javac -d build/classes -h build/native launcher/src/AoyouLauncher.java
          mkdir -p build/classes/META-INF
          echo "Manifest-Version: 1.0" > build/classes/META-INF/MANIFEST.MF
          echo "Main-Class: AoyouLauncher" >> build/classes/META-INF/MANIFEST.MF

      - name: 构建 All-in-One JAR
        run: |
          cd build/classes
          jar cfm ../../aoyou-panel.jar META-INF/MANIFEST.MF *.class
          cd ../..
          # 打包 .so 到 JAR
          jar uf aoyou-panel.jar -C build/native libnative_exec.so
          # 打包 app/
          jar uf aoyou-panel.jar app/index.js app/package.json
          # 打包 node_modules
          jar uf aoyou-panel.jar -C runtime node_modules
          echo "=============================="
          ls -lh aoyou-panel.jar
          echo "=============================="
          echo "JAR 内容:"
          jar tf aoyou-panel.jar | head -20
          echo "..."
          echo "JAR 总文件数: $(jar tf aoyou-panel.jar | wc -l)"
          echo ""
          echo "=== 验证 .so 在 JAR 里 ==="
          jar tf aoyou-panel.jar | grep "libnative_exec.so" && echo "✅ .so 存在" || echo "❌ .so 缺失"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: aoyou-panel-jar
          path: aoyou-panel.jar
          retention-days: 30

      - name: 发布到 GitHub Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          files: aoyou-panel.jar
          tag_name: latest
          name: "傲游面板 JNI 版 (Latest)"
          body: |
            ## 傲游面板 JNI 版 v3.0

            ### 核心改进：JNI execv
            - 只有 1 个进程（JVM 被 node 替换，PID 不变）
            - 节省 ~150MB 内存
            - 进程伪装成 java

            ### 使用方法
            1. 下载 `aoyou-panel.jar`
            2. 启动: `java -jar aoyou-panel.jar`
            3. 默认密码: `1715`

            ### 自动更新
            启动时自动从 GitHub 下载最新 index.js
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
